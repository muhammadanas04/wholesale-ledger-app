appId: com.wholesale.ledger
productName: Wholesale Ledger
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - electron/**/*
  - package.json
publish:
  provider: github
  owner: muhammadanas04
  repo: wholesale-ledger-app
  releaseType: draft
linux:
  target:
    - AppImage
win:
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
